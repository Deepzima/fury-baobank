# Technology Decisions (ADR-style)
# Generated by /arch-init from docs/ARCHITECTURE.md. Review and refine.

decisions:
  - id: "TD-001"
    title: "OpenBao as secret storage server"
    status: "accepted"
    date: "2026-04-13"
    context: "Need a Vault-compatible secret storage that avoids HashiCorp BSL licensing issues."
    decision: "Use OpenBao — Linux Foundation fork of Vault under MPL 2.0."
    alternatives:
      - "HashiCorp Vault — rejected due to BSL license concerns"
      - "AWS Secrets Manager / cloud-native — rejected because we need a cluster-local solution"
    consequences:
      - "Open source under MPL 2.0 — no licensing concerns"
      - "API compatibility with Vault — most tooling should work"
      - "Bank-Vaults officially supports Vault, OpenBao support is not yet validated"

  - id: "TD-002"
    title: "Bank-Vaults for operator and webhook tooling"
    status: "accepted"
    date: "2026-04-13"
    context: "Need declarative K8s management of OpenBao plus transparent secret injection into pods without modifying application code."
    decision: "Use Bank-Vaults ecosystem: operator for OpenBao deployment, webhook for secret injection."
    alternatives:
      - "HashiCorp Vault Agent Injector — mature but official Vault-only"
      - "External Secrets Operator — lighter but sync-only, no dynamic secrets"
      - "Custom operator — rejected, too much effort"
    consequences:
      - "Automated init, unseal, and config"
      - "Mutating webhook injects secrets as env vars, config maps, or CRs"
      - "Depends on Bank-Vaults supporting OpenBao (validation scope of this lab)"

  - id: "TD-003"
    title: "Raft as OpenBao storage backend"
    status: "accepted"
    date: "2026-04-13"
    context: "OpenBao requires a storage backend for secrets and state. Need HA without external dependencies."
    decision: "Use Raft (integrated storage) with 3 replicas."
    alternatives:
      - "Consul backend — external dependency, additional operational burden"
      - "Single-replica file backend — no HA"
    consequences:
      - "No external dependency, HA native"
      - "Leader election handled by OpenBao itself"
      - "Each replica needs its own PVC (zone-locked)"

  - id: "TD-004"
    title: "K8s Secret for unseal keys (lab only)"
    status: "proposed"
    date: "2026-04-13"
    context: "OpenBao needs unseal keys on every restart. Production uses KMS or HSM; the lab needs a simpler approach."
    decision: "Store encrypted unseal keys in a Kubernetes Secret for the lab. Document that production must use cloud KMS or HSM."
    alternatives:
      - "AWS KMS / GCP KMS / Azure Key Vault — requires cloud credentials in local lab"
      - "HSM — not practical in Kind cluster"
      - "Manual unseal — not automatable"
    consequences:
      - "Lab is self-contained, no external dependencies"
      - "NOT production-safe — anyone with K8s access can read unseal keys"
      - "Production deployment needs a separate decision for unseal strategy"

  - id: "TD-005"
    title: "Kubernetes auth method for pod-to-OpenBao authentication"
    status: "accepted"
    date: "2026-04-13"
    context: "Applications need to authenticate to OpenBao. Static tokens require rotation; cloud auth methods require cloud integration."
    decision: "Use OpenBao Kubernetes auth method — pods authenticate via their ServiceAccount token, which is validated by OpenBao via TokenReview."
    alternatives:
      - "Static tokens — hard to rotate, security risk"
      - "AppRole — requires bootstrapping secret delivery"
      - "JWT auth — more complex for the lab scope"
    consequences:
      - "Zero-touch authentication — no secret bootstrap needed"
      - "Requires OpenBao to have a ServiceAccount with TokenReview permission"
      - "Works natively with Bank-Vaults Webhook"

  - id: "TD-006"
    title: "Kind as local orchestrator for the lab"
    status: "accepted"
    date: "2026-04-13"
    context: "Lab must run locally on developer machines without cloud costs or external dependencies."
    decision: "Use Kind via zlab for cluster lifecycle."
    alternatives:
      - "k3d — valid alternative, but Kind is standard in Fury labs"
      - "Minikube — slower, less flexible"
    consequences:
      - "Same pattern as other Fury labs (ingress-full, istio-full, logging-webhook-test)"
      - "3 nodes, calico CNI, cert-manager addon"
