# C4 Level 1: System Context
# Generated by /arch-init from docs/ARCHITECTURE.md. Review and refine.

name: "fury-baobank"
description: "Lab that validates OpenBao + Bank-Vaults integration on KFD for declarative secret management and transparent pod injection."

actors:
  - name: "Platform Operator"
    type: "person"
    description: "SIGHUP engineer who deploys and configures the secret management stack via declarative CRs."
    interactions:
      - target: "Vault CR"
        protocol: "cli"
        description: "Applies a Vault CR via kubectl to declare the desired OpenBao configuration."

  - name: "Application Pod"
    type: "system"
    description: "User workload that consumes secrets via env vars without any Vault-aware client code."
    interactions:
      - target: "Bank-Vaults Webhook"
        protocol: "http"
        description: "Pod creation is intercepted by the mutating admission webhook for secret injection."

  - name: "Unseal Key Store"
    type: "system"
    description: "Storage for encrypted unseal keys. In the lab it is a K8s Secret; in production it is AWS KMS, GCP KMS, Azure Key Vault, or HSM."
    interactions:
      - target: "Bank-Vaults Operator"
        protocol: "http"
        description: "Provides encrypted unseal keys to the operator for automatic OpenBao unseal on restart."

  - name: "Prometheus"
    type: "system"
    description: "KFD monitoring that scrapes OpenBao metrics."
    interactions:
      - target: "OpenBao Service"
        protocol: "http"
        description: "Scrapes /metrics endpoint to collect OpenBao operational metrics."
