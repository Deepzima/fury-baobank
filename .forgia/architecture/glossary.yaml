# Glossary — Ubiquitous Language
# Generated by /arch-init from docs/ARCHITECTURE.md. Review and refine.

terms:
  - term: "OpenBao"
    meaning: "Open source Linux Foundation fork of HashiCorp Vault under MPL 2.0, API-compatible with Vault."

  - term: "Bank-Vaults"
    meaning: "Cisco/Banzai Cloud project providing operator, webhook, CLI, and SDK for running Vault (and potentially OpenBao) on Kubernetes."

  - term: "Vault CR"
    meaning: "Custom Resource consumed by Bank-Vaults Operator that declares the desired OpenBao configuration (replicas, storage, policies, auth methods)."

  - term: "Seal / Unseal"
    meaning: "OpenBao state: sealed means the server is running but cannot read encrypted data; unsealed means the master key is in memory and the server is operational."

  - term: "Unseal Keys"
    meaning: "Shamir-split master key — need 3 of 5 to reconstruct the master key and unseal the server."

  - term: "Auto-unseal"
    meaning: "Automatic unseal on startup using encrypted keys from an external store (KMS, HSM, or K8s Secret in the lab)."

  - term: "Secret Injection"
    meaning: "Mutating webhook pattern that replaces vault-annotated env vars in pod spec with real secret values fetched from OpenBao before the pod starts."

  - term: "KV Engine"
    meaning: "Key-Value storage engine in OpenBao for static secrets. Supports versioning (v2)."

  - term: "Transit Engine"
    meaning: "Encryption-as-a-service: OpenBao encrypts and decrypts data on behalf of applications without storing the plaintext."

  - term: "Dynamic Secret"
    meaning: "Secret generated on-the-fly with a TTL (e.g., temporary DB credentials). Automatically revoked on expiry."

  - term: "Kubernetes Auth Method"
    meaning: "OpenBao auth backend that accepts a Kubernetes ServiceAccount token as proof of identity, validates it via TokenReview, and returns a Vault token."

  - term: "Policy"
    meaning: "HCL document that grants/denies capabilities (read, write, delete, list) on specific OpenBao paths."

  - term: "Raft"
    meaning: "Integrated consensus protocol used as OpenBao HA storage backend. Replaces external Consul backend."
