# Constraints
# Generated by /arch-init from docs/ARCHITECTURE.md. Review and refine.

constraints:
  - name: "no-hashicorp-bsl"
    type: "compliance"
    description: "Cannot use components under HashiCorp BSL license."
    impact: "Must use OpenBao instead of Vault. Any future Vault feature must be validated against OpenBao fork."

  - name: "kind-only"
    type: "technical"
    description: "Lab runs on Kind, no cloud resources."
    impact: "Unseal cannot use AWS KMS / GCP KMS / HSM. Must use local K8s Secret (documented as non-production)."

  - name: "kfd-alignment"
    type: "technical"
    description: "Must integrate with KFD monitoring stack when present."
    impact: "OpenBao must expose Prometheus metrics and provide a ServiceMonitor/PodMonitor. Config must not conflict with KFD base."

  - name: "single-tenant-scope"
    type: "timeline"
    description: "Phase 1 validates single-tenant only."
    impact: "No Capsule, no BaobankTenant CRD, no multi-instance orchestration. Those are explicit future phases."

  - name: "lab-only-no-production"
    type: "compliance"
    description: "Lab is not a production artifact."
    impact: "Unseal key storage, TLS config, and backup strategies are simplified. Any production adoption requires a separate review."

  - name: "kubernetes-versions"
    type: "technical"
    description: "Must work with K8s 1.29+ (KFD supported versions)."
    impact: "Bank-Vaults operator version must be compatible with K8s 1.29-1.31. Validated via Helm chart compatibility matrix."
