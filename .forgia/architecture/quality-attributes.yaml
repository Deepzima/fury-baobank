# Quality Attributes
# Generated by /arch-init from docs/ARCHITECTURE.md. Review and refine.

attributes:
  - name: "declarative-ops"
    description: "OpenBao lifecycle must be managed via Kubernetes CRs, not manual commands."
    target: "Zero manual kubectl-exec needed for init, unseal, policy config, or secret read"
    priority: "critical"
    rationale: "Lab validates the Bank-Vaults declarative model. Manual steps defeat the purpose."

  - name: "auto-recovery"
    description: "OpenBao must recover from pod restart without human intervention."
    target: "After kubectl delete pod, cluster returns to ready state within 60 seconds"
    priority: "high"
    rationale: "Auto-unseal is one of the primary value propositions of Bank-Vaults."

  - name: "transparent-injection"
    description: "Application pods must receive secrets without Vault-aware client code."
    target: "Sample app uses standard os.Getenv or equivalent to read injected secrets"
    priority: "critical"
    rationale: "Validates the webhook injection pattern, which is the main UX benefit."

  - name: "api-compatibility"
    description: "Bank-Vaults tooling must work against OpenBao API without modification."
    target: "Operator and webhook deploy and operate against OpenBao without errors or warnings"
    priority: "critical"
    rationale: "Core validation scope of the lab — confirms OpenBao can replace Vault in Bank-Vaults deployments."

  - name: "ha-resilience"
    description: "Killing the leader pod must not disrupt the cluster."
    target: "Leader election completes within 30 seconds; reads/writes continue with <5s interruption"
    priority: "high"
    rationale: "Validates Raft HA works in OpenBao as documented."

  - name: "reproducibility"
    description: "Lab must run identically on any developer machine."
    target: "mise install && mise run setup-all completes on macOS and Linux without manual steps"
    priority: "medium"
    rationale: "Lab is a shared artifact; must not depend on personal environment."
