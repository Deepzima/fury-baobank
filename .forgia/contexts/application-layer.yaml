# Bounded Context: Application Layer
# Generated by /arch-init from docs/ARCHITECTURE.md. Review and refine.

name: "application-layer"
responsibilities:
  - "Consume secrets from OpenBao via transparent injection"
  - "Authenticate to OpenBao via Kubernetes ServiceAccount (when direct API calls are needed)"
  - "Demonstrate that no Vault client code is required in the application"

ubiquitous_language:
  - term: "vault annotation"
    meaning: "Pod-level annotation or env var prefix (e.g., 'vault:secret/data/myapp#password') that the webhook detects and replaces."
  - term: "service account auth"
    meaning: "Kubernetes ServiceAccount whose token OpenBao validates via TokenReview to grant a Vault token."

interfaces:
  - with: "management-plane"
    protocol: "http"
    contract: "Kubernetes admission webhook — pod creation intercepted"
    direction: "outbound"
  - with: "data-plane"
    protocol: "http"
    contract: "OpenBao HTTP API (only when app bypasses webhook and calls OpenBao directly)"
    direction: "outbound"

dependencies:
  depends_on: ["management-plane", "data-plane"]
  depended_by: []

