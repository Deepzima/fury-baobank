apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vault-unseal-secrets
  namespace: scen-acme
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vault-unseal-secrets
  namespace: scen-acme
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: vault-unseal-secrets
subjects:
  - kind: ServiceAccount
    name: default
    namespace: scen-acme
