# Default-deny NetworkPolicy for tenant namespaces.
# Allows only: same-namespace traffic + DNS (kube-dns on port 53).
# This is the PRIMARY cross-tenant isolation boundary (threat model rec).
#
# Applied per-tenant namespace by the BATS setup_file.
# In production, use Capsule GlobalTenantResources to inject automatically.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-cross-tenant
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from pods in the same namespace only.
    - from:
        - podSelector: {}
  egress:
    # Allow traffic to pods in the same namespace.
    - to:
        - podSelector: {}
    # Allow DNS resolution (kube-dns in kube-system).
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
        - podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow K8s API access (bank-vaults sidecar needs it for unseal keys
    # Secret read/write and Kubernetes auth method).
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
